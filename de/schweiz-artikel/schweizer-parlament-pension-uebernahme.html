<meta property="og:description" content="Das Nationalrat hat eine vorübergehende Erhöhung der IVA (Mehrwertsteuer) zur Finanzierung der 13. AHV-Rente bewilligt. Die Debatte verdeutlicht die Spannungen zwischen den Parteien bezüglich des alternden Rentensystems. ## Hintergrund und Details  - Die Erhöhung der IVA soll vorübergehend erfolgen, um die zusätzliche Rentenzahlung zu unterstützen.  - Der Entscheid spiegelt die Herausforderungen wider, denen sich die Schweiz bei der Finanzierung des Alters- und Hinterlassenenversicherung (AHV) gegenübersieht.  - Die Diskussionen im Parlament zeigen unterschiedliche Ansichten über die bestehenden Probleme und mögliche Lösungen.  ## Reaktionen der Parteien  Die Befürworter der Massnahme argumentieren, dass sie notwendig ist, um die langfristige Stabilität der AHV zu gewährleisten. Kritiker bemängeln die Belastung für die Bevölkerung und fordern alternative Finanzierungsmodelle. Die Debatte unterstreicht die Notwendigkeit eines breiten Konsenses über die Reform des Rentensystems.  ## Ausblick  Es bleibt abzuwarten, wie sich die Situation entwickelt und welche weiteren Massnahmen ergriffen werden müssen, um die AHV zukunftsfähig zu machen. Die Frage der Finanzierung der Renten bleibt ein zentrales Thema in der Schweizer Politik.">
