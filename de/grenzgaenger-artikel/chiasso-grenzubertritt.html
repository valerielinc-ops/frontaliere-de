<meta property="og:description" content="Informationen zu den aktuellen Bedingungen des Grenzübergangs in Chiasso.  ### Aktuelle Informationen  - Die aktuellen Bedingungen des Grenzübergangs in Chiasso können auf der Website der Schweizerischen Zollverwaltung [https://www.ezv.admin.ch](https://www.ezv.admin.ch) abgerufen werden.  ### Was ist eine G-Bewilligung?  Eine G-Bewilligung ist ein Dokument, das für Grenzgänger benötigt wird, um den Grenzübergang in der Schweiz zu nutzen. Die G-Bewilligung wird von der Schweizerischen Zollverwaltung ausgestellt und muss im Besitz des Grenzgängers sein, wenn er den Grenzübergang nutzt.  ### Was sind Franken?  Franken sind die Währung der Schweiz. Der Kurs der Franken kann je nach Tag und Uhrzeit variieren. Es ist ratsam, sich vor dem Grenzübergang über den aktuellen Kurs zu informieren.  ### Brückentage  Brückentage sind Feiertage, an denen die Grenzübergänge in der Schweiz geschlossen sind. Die Brückentage in der Schweiz sind: 1. Januar, 1. Mai, 8. Dezember und Weihnachten.  ### Swissminiatur  Die Swissminiatur ist ein beliebtes Ausflugsziel in der Schweiz. Es bietet eine Miniaturversion der Schweizer Städte und Sehenswürdigkeiten.  ### Grenzgänger  Grenzgänger sind Personen, die regelmäßig zwischen der Schweiz und Italien pendeln. Sie benötigen eine G-Bewilligung, um den Grenzübergang in der Schweiz zu nutzen.  ### Einrichtungen  Die Einrichtungen am Grenzübergang in Chiasso bieten verschiedene Dienstleistungen an, wie z.B. die Einreise- und Ausreiseformalitäten, die Abfertigung von Gütern und die Information über die aktuellen Bedingungen des Grenzübergangs.">
